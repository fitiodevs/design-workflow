# design-workflow project config
#
# Copy to your project root as `.design-workflow.yaml` and adjust paths.
# Skills read this file to locate your design tokens, product doc, and
# scripts. All paths are resolved relative to the project root.

# Active stack — selects the adapter for code emission.
# Valid values: flutter (default), nextjs-tailwind. Other adapters land in v1.3+.
# Override per-invocation via the STACK env var.
stack: flutter

# Optional path overrides per stack. Defaults documented in
# adapters/<stack>/STACK_NOTES.md.
# paths:
#   nextjs_tailwind:
#     tokens_css: app/globals.css
#     tailwind_config: tailwind.config.ts
#     components_root: components
#   flutter:
#     app_colors: lib/core/theme/app_colors.dart
#     widgets_root: lib/features/{feature}/presentation/widgets

# Tokens — Flutter-first defaults
tokens:
  colors: lib/core/theme/app_colors.dart
  spacing: lib/core/theme/app_spacing.dart
  motion: lib/core/theme/app_motion.dart
  curves: lib/core/theme/app_curves.dart
  text_theme: lib/core/theme/app_theme.dart

# Product context — used by `theme-critique` for persona walkthrough,
# AI-slop verdict, and copy alignment.
product:
  doc: docs/product.md
  personas:
    # 3 archetypal users for walkthrough. Keep concrete (named, with
    # context), not abstract ("the user"). Skill reads these to simulate
    # screen reactions.
    - name: ""
      context: ""
      goal: ""
    - name: ""
      context: ""
      goal: ""
    - name: ""
      context: ""
      goal: ""

# Design system widget conventions
widgets:
  prefix: App                # AppButton, AppDialog, AppScaffold, ...
  primary_button: AppButton
  scaffold: AppScaffold
  text_field: AppTextField
  dialog: AppDialog
  snackbar: AppSnackbar

# Locale of user-facing copy (used by ux-writing + theme-port)
locale: pt_BR

# Framework meta — informational, used by skills to tailor judgment calls
# (state lib idioms, routing, backend). Distinct from `stack:` above which
# selects the code-emission adapter.
framework_meta:
  framework: flutter
  state: riverpod
  routing: go_router
  backend: supabase
