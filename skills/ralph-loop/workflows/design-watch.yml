# Tier 1 — Watch (read-only). Daily cron + on push to main.
# Copy to .github/workflows/ on the adopting repo.

name: design-watch (Tier 1)

on:
  schedule:
    - cron: "0 9 * * *"   # daily 09:00 UTC
  push:
    branches: [main]

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ralph Tier 1 Watch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # The harness invocation that spawns the model with this skill.
          # Replace with anthropic-ai/claude-action when published, or local CLI.
          python scripts/ralph_tick.py --tier watch --feature project-wide

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ralph-watch-log-${{ github.run_id }}
          path: .design-spec/features/*/loop-log/*.jsonl
          if-no-files-found: ignore
