# Tier 2 — Mechanical drift sweep. Weekly Friday 17h UTC-3 (20h UTC).
# Opens PR draft with deterministic fixes; never auto-merges.
# Copy to .github/workflows/ on the adopting repo.

name: design-sprint (Tier 2)

on:
  schedule:
    - cron: "0 20 * * 5"   # Friday 17h UTC-3 = 20h UTC
  workflow_dispatch:

jobs:
  mechanical-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create work branch
        run: |
          git config user.name "ralph-bot"
          git config user.email "noreply@anthropic.com"
          git checkout -b "ralph/sprint-$(date -u +%Y%m%d)"

      - name: Run Ralph Tier 2 Mechanical
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/ralph_tick.py --tier mechanical --feature project-wide --loop

      - name: Push branch
        run: |
          git push -u origin HEAD || echo "no changes to push"

      - name: Open PR draft
        uses: peter-evans/create-pull-request@v6
        with:
          draft: true
          base: main
          branch: ${{ github.run_id }}-ralph-sprint
          title: "ralph: weekly drift sweep ($(date -u +%Y-%m-%d))"
          body: |
            Tier 2 Mechanical sweep. Each commit is one deterministic fix with verify.
            Review the audit log under `.design-spec/features/*/loop-log/*.jsonl`.
            **Never auto-merged** — review and merge manually after CI green.

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ralph-sprint-log-${{ github.run_id }}
          path: .design-spec/features/*/loop-log/*.jsonl
          if-no-files-found: ignore
