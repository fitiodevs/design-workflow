# Tier 1 — Watch on PRs. Runs critique + audit on changed feature paths.
# Copy to .github/workflows/ on the adopting repo.

name: design-pre-merge (Tier 1)

on:
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - "docs/product.md"
      - "docs/design-tokens.md"

jobs:
  pre-merge-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute changed feature
        id: changed
        run: |
          # naive: pick first feature dir touched by the PR
          changed=$(git diff --name-only origin/main...HEAD | grep -oE 'lib/features/[^/]+' | head -1 || echo "")
          echo "feature=${changed#lib/features/}" >> "$GITHUB_OUTPUT"

      - name: Run Ralph Tier 1 on changed feature
        if: steps.changed.outputs.feature != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/ralph_tick.py --tier watch --feature "${{ steps.changed.outputs.feature }}"

      - name: Comment audit summary on PR
        if: always() && steps.changed.outputs.feature != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = `.design-spec/features/${{ steps.changed.outputs.feature }}/loop-log`;
            if (!fs.existsSync(path)) return;
            const files = fs.readdirSync(path).sort().reverse();
            if (!files.length) return;
            const log = fs.readFileSync(`${path}/${files[0]}`, 'utf8').trim().split('\n').slice(-5).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Ralph Watch (Tier 1)\n```jsonl\n' + log + '\n```'
            });
