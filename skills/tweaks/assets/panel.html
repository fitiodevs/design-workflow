<!--
  skills/tweaks/assets/panel.html
  Injected before </body> of any tweaks-ready input HTML.
  Placeholders: %BASENAME% (input filename) and %CONTENT_SHA% (sha8 of content).
  Vanilla HTML+CSS+JS. No frameworks. ~250 lines.
-->

<aside id="dw-tweaks-panel" class="dw-tweaks" aria-label="Design tweaks panel">
  <header class="dw-tweaks__head">
    <h2 class="dw-tweaks__title">Tweak the design</h2>
    <span class="dw-tweaks__sub">%BASENAME%</span>
  </header>

  <fieldset class="dw-tweaks__field">
    <legend>Accent hue</legend>
    <input type="range" id="dw-knob-hue" min="0" max="360" value="18" step="1" />
    <div class="dw-tweaks__row">
      <output id="dw-knob-hue-out">18°</output>
      <span class="dw-tweaks__swatch" id="dw-knob-hue-swatch" aria-hidden="true"></span>
    </div>
  </fieldset>

  <fieldset class="dw-tweaks__field">
    <legend>Type scale</legend>
    <label><input type="radio" name="dw-knob-scale" value="1.200" /> 1.2 (compact)</label>
    <label><input type="radio" name="dw-knob-scale" value="1.250" checked /> 1.25 (default)</label>
    <label><input type="radio" name="dw-knob-scale" value="1.333" /> 1.333 (open)</label>
  </fieldset>

  <fieldset class="dw-tweaks__field">
    <legend>Density</legend>
    <label><input type="radio" name="dw-knob-density" value="compact" /> compact (6px)</label>
    <label><input type="radio" name="dw-knob-density" value="comfortable" checked /> comfortable (8px)</label>
    <label><input type="radio" name="dw-knob-density" value="loose" /> loose (12px)</label>
  </fieldset>

  <fieldset class="dw-tweaks__field">
    <legend>Theme</legend>
    <label><input type="radio" name="dw-knob-mode" value="light" checked /> light</label>
    <label><input type="radio" name="dw-knob-mode" value="dark" /> dark</label>
  </fieldset>

  <fieldset class="dw-tweaks__field">
    <legend>Motion</legend>
    <label><input type="radio" name="dw-knob-motion" value="on" checked /> on</label>
    <label><input type="radio" name="dw-knob-motion" value="reduced" /> reduced</label>
  </fieldset>

  <div class="dw-tweaks__actions">
    <button type="button" id="dw-tweaks-reset">Reset</button>
    <button type="button" id="dw-tweaks-collapse" aria-pressed="false">Collapse</button>
  </div>

  <details class="dw-tweaks__details">
    <summary>Export current state</summary>
    <pre id="dw-tweaks-state">{}</pre>
  </details>
</aside>

<style>
  :root {
    --accent-h: 18;
    --accent-s: 70%;
    --accent-l: 50%;
    --accent: hsl(var(--accent-h) var(--accent-s) var(--accent-l));
    --scale: 1.250;
    --space-unit: 8px;
    --base-size: 16px;
  }

  /* Panel chrome — namespaced under .dw-tweaks to never bleed into the wrapped mockup. */
  .dw-tweaks {
    position: fixed; right: 16px; top: 16px; width: 280px;
    max-height: calc(100vh - 32px); overflow-y: auto;
    padding: 14px 16px; background: #fff; color: #111;
    border: 1px solid #ddd; border-radius: 10px;
    font: 13px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
    z-index: 99999; box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  }
  .dw-tweaks[data-collapsed="true"] { width: 56px; padding: 14px; overflow: hidden; }
  .dw-tweaks[data-collapsed="true"] > :not(.dw-tweaks__head):not(.dw-tweaks__actions) { display: none; }
  .dw-tweaks[data-collapsed="true"] .dw-tweaks__title { display: none; }
  .dw-tweaks[data-collapsed="true"] .dw-tweaks__sub { display: none; }
  .dw-tweaks[data-collapsed="true"] #dw-tweaks-reset { display: none; }
  .dw-tweaks__head { margin: 0 0 10px; }
  .dw-tweaks__title { font-size: 14px; font-weight: 600; margin: 0; }
  .dw-tweaks__sub { font-size: 11px; color: #888; word-break: break-all; }
  .dw-tweaks__field { border: 0; padding: 0; margin: 0 0 12px; }
  .dw-tweaks__field legend { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #666; padding: 0; margin-bottom: 6px; }
  .dw-tweaks__field label { display: block; font-size: 12px; padding: 2px 0; cursor: pointer; }
  .dw-tweaks__field input[type="range"] { width: 100%; margin: 4px 0 0; }
  .dw-tweaks__row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .dw-tweaks__swatch { width: 18px; height: 18px; border-radius: 4px; border: 1px solid #ccc; background: var(--accent); }
  .dw-tweaks__actions { display: flex; gap: 8px; margin-top: 12px; }
  .dw-tweaks__actions button { font: inherit; padding: 6px 10px; border: 1px solid #ccc; background: #f7f7f7; border-radius: 6px; cursor: pointer; }
  .dw-tweaks__actions button:hover { background: #eee; }
  .dw-tweaks__details { margin-top: 12px; font-size: 11px; }
  .dw-tweaks__details pre { background: #f7f7f7; border: 1px solid #eee; border-radius: 4px; padding: 6px; overflow-x: auto; max-height: 100px; }

  /* Motion respect. */
  :root[data-motion="reduced"] *, :root[data-motion="reduced"] *::before, :root[data-motion="reduced"] *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
</style>

<script>
  (function() {
    "use strict";
    var STORAGE_KEY = "tweaks:%BASENAME%:%CONTENT_SHA%";
    var root = document.documentElement;
    var panel = document.getElementById("dw-tweaks-panel");
    if (!panel) return;

    // ---- Defaults (must match the markup defaults above) ----
    var defaults = {
      hue: 18,
      scale: "1.250",
      density: "comfortable",
      mode: "light",
      motion: "on"
    };

    // ---- Validation: clamp incoming state to safe ranges. ----
    function sanitize(state) {
      var s = Object.assign({}, defaults, state || {});
      var hue = parseInt(s.hue, 10);
      if (!isFinite(hue) || hue < 0 || hue > 360) hue = defaults.hue;
      s.hue = hue;
      if (["1.200", "1.250", "1.333"].indexOf(s.scale) < 0) s.scale = defaults.scale;
      if (["compact", "comfortable", "loose"].indexOf(s.density) < 0) s.density = defaults.density;
      if (["light", "dark"].indexOf(s.mode) < 0) s.mode = defaults.mode;
      if (["on", "reduced"].indexOf(s.motion) < 0) s.motion = defaults.motion;
      return s;
    }

    function densityToUnit(density) {
      return ({ compact: "6px", comfortable: "8px", loose: "12px" })[density] || "8px";
    }

    // ---- Apply state to CSS custom properties + data attributes. ----
    function applyState(state) {
      root.style.setProperty("--accent-h", String(state.hue));
      root.style.setProperty("--scale", state.scale);
      root.style.setProperty("--space-unit", densityToUnit(state.density));
      root.dataset.mode = state.mode;
      root.dataset.motion = state.motion;
      // Reflect into the form controls.
      var hueInput = document.getElementById("dw-knob-hue");
      var hueOut = document.getElementById("dw-knob-hue-out");
      if (hueInput) hueInput.value = String(state.hue);
      if (hueOut) hueOut.textContent = state.hue + "°";
      ["scale", "density", "mode", "motion"].forEach(function(k) {
        var radios = panel.querySelectorAll('input[name="dw-knob-' + k + '"]');
        radios.forEach(function(r) { r.checked = (r.value === state[k]); });
      });
      // Surface state in the export <pre>.
      var pre = document.getElementById("dw-tweaks-state");
      if (pre) pre.textContent = JSON.stringify(state, null, 2);
    }

    function persist(state) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch (err) { /* quota or disabled — fail silently */ }
    }

    function readState() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        return sanitize(raw ? JSON.parse(raw) : {});
      } catch (err) {
        return Object.assign({}, defaults);
      }
    }

    // ---- Bind controls. ----
    var current = readState();
    applyState(current);

    document.getElementById("dw-knob-hue").addEventListener("input", function(e) {
      current.hue = parseInt(e.target.value, 10) || defaults.hue;
      current = sanitize(current);
      applyState(current);
      persist(current);
    });

    ["scale", "density", "mode", "motion"].forEach(function(k) {
      panel.querySelectorAll('input[name="dw-knob-' + k + '"]').forEach(function(r) {
        r.addEventListener("change", function(e) {
          current[k] = e.target.value;
          current = sanitize(current);
          applyState(current);
          persist(current);
        });
      });
    });

    document.getElementById("dw-tweaks-reset").addEventListener("click", function() {
      try { localStorage.removeItem(STORAGE_KEY); } catch (err) {}
      current = Object.assign({}, defaults);
      applyState(current);
    });

    var collapseBtn = document.getElementById("dw-tweaks-collapse");
    collapseBtn.addEventListener("click", function() {
      var collapsed = panel.dataset.collapsed === "true";
      panel.dataset.collapsed = collapsed ? "false" : "true";
      collapseBtn.setAttribute("aria-pressed", String(!collapsed));
      collapseBtn.textContent = collapsed ? "Collapse" : "Expand";
    });
  })();
</script>
